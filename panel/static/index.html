<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hysteria 2 Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <!-- Login Screen -->
    <div id="login-screen" class="max-w-md mx-auto mt-24">
      <div class="bg-gray-900 rounded-3xl p-10 shadow-2xl border border-gray-800">
        <div class="flex items-center gap-4 mb-8">
          <i class="fa-solid fa-shield-halved text-5xl text-emerald-500"></i>
          <h1 class="text-3xl font-bold">Hysteria Panel</h1>
        </div>
        <input id="username" type="text" value="admin" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 mb-4 focus:outline-none focus:border-emerald-500 text-lg">
        <input id="password" type="password" placeholder="Пароль администратора" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 mb-8 focus:outline-none focus:border-emerald-500 text-lg">
        <button onclick="login()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg transition-colors">Войти в панель</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold flex items-center gap-3"><i class="fa-solid fa-shield-halved text-emerald-500"></i> Управление пользователями</h1>
        <button onclick="logout()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-6 py-3 rounded-2xl text-sm font-medium">
          <i class="fa-solid fa-right-from-bracket"></i> Выйти
        </button>
      </div>

      <div class="bg-gray-900 rounded-3xl p-8 border border-gray-800">
        <div class="flex gap-4 mb-8">
          <input id="new-username" placeholder="Имя пользователя" class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
          <input id="new-password" placeholder="Пароль пользователя" class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
          <button onclick="createUser()" class="bg-emerald-500 hover:bg-emerald-600 px-10 rounded-2xl font-medium">Создать</button>
        </div>

        <table class="w-full" id="users-table">
          <thead>
            <tr class="text-left text-gray-400 border-b border-gray-700">
              <th class="pb-4">Пользователь</th>
              <th class="pb-4">Дата создания</th>
              <th class="pb-4 text-right">Действия</th>
            </tr>
          </thead>
          <tbody class="text-gray-200"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let token = '';

    async function apiCall(method, url, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;

      const res = await fetch(url, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) throw new Error('Ошибка');
      return res.json();
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const data = await (await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({username, password})
        })).json();
        token = data.access_token;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        loadUsers();
      } catch(e) {
        alert('Неверный логин или пароль');
      }
    }

    async function loadUsers() {
      const data = await apiCall('GET', '/api/users');
      const tbody = document.querySelector('#users-table tbody');
      tbody.innerHTML = '';
      data.users.forEach(u => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-800 hover:bg-gray-800 transition-colors';
        tr.innerHTML = `
          <td class="py-5 font-medium">${u.username}</td>
          <td class="py-5 text-gray-400">${new Date(u.created_at).toLocaleDateString('ru-RU')}</td>
          <td class="py-5 text-right space-x-4">
            <button onclick="copyConfig('${u.username}')" class="text-emerald-400 hover:text-emerald-500"><i class="fa-solid fa-copy"></i></button>
            <button onclick="deleteUser('${u.username}')" class="text-red-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function createUser() {
      const username = document.getElementById('new-username').value.trim();
      const password = document.getElementById('new-password').value.trim();
      if (!username || !password) return alert('Заполните оба поля');
      await apiCall('POST', '/api/users', {username, password});
      loadUsers();
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
    }

    async function deleteUser(username) {
      if (!confirm(`Удалить пользователя ${username}?`)) return;
      await apiCall('DELETE', `/api/users/${username}`);
      loadUsers();
    }

    async function copyConfig(username) {
      const data = await apiCall('GET', `/api/config/${username}`);
      await navigator.clipboard.writeText(data.uri);
      alert(`✅ URI для ${username} скопирован!\n\n${data.uri}`);
    }

    function logout() {
      token = '';
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
    }
  </script>
</body>
</html>
